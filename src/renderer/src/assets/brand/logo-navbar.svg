<svg width="220" height="40" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Compact compass icon -->
  <rect x="2" y="2" width="36" height="36" rx="8" fill="#5B4FC4"/>
  <circle cx="20" cy="20" r="13" fill="none" stroke="#fff" stroke-width="1" opacity="0.15"/>
  <g opacity="0.35">
    <line x1="20" y1="7" x2="20" y2="10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="20" y2="33" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="20" x2="10" y2="20" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="33" y2="20" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Debris hint bottom-left -->
  <g opacity="0.2">
    <rect x="8" y="26" width="4" height="1.5" rx="0.75" fill="#fff" transform="rotate(15 10 26.75)"/>
    <rect x="11" y="24" width="3" height="1.5" rx="0.75" fill="#fff" transform="rotate(-20 12.5 24.75)"/>
    <circle cx="9" cy="28" r="1" fill="#fff"/>
  </g>
  <!-- Neural net hint top-right -->
  <g opacity="0.3">
    <circle cx="28" cy="13" r="1.2" fill="#85B7EB"/>
    <circle cx="31" cy="16" r="1.2" fill="#85B7EB"/>
    <circle cx="27" cy="17" r="1.2" fill="#85B7EB"/>
    <line x1="28" y1="13" x2="31" y2="16" stroke="#85B7EB" stroke-width="0.5"/>
    <line x1="31" y1="16" x2="27" y2="17" stroke="#85B7EB" stroke-width="0.5"/>
    <line x1="28" y1="13" x2="27" y2="17" stroke="#85B7EB" stroke-width="0.5"/>
  </g>
  <!-- Clear path line -->
  <path d="M20 20 L30 10" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Needle -->
  <g transform="translate(20,20) rotate(-45)">
    <polygon points="0,-11 2.5,-2 0,-4 -2.5,-2" fill="#fff"/>
    <polygon points="0,11 2.5,2 0,4 -2.5,2" fill="#fff" opacity="0.2"/>
  </g>
  <!-- Hub -->
  <circle cx="20" cy="20" r="3" fill="#5B4FC4" stroke="#fff" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="1.5" fill="#5DCAA5"/>
  <!-- Destination sparkle -->
  <circle cx="31" cy="9" r="2" fill="#5DCAA5"/>
  <circle cx="31" cy="9" r="1" fill="#fff"/>

  <!-- Wordmark -->
  <text x="48" y="27" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1a1a1a">Clear<tspan fill="#7F77DD">Path</tspan><tspan fill="#1D9E75">AI</tspan></text>
</svg>
