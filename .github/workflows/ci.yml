name: CI — Tests

on:
  push:
    branches:
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Force-update all screenshot baselines (intentional bulk update)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Verify Git LFS
        run: git lfs ls-files

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

  # ── Screenshot regression tests ──────────────────────────────────────────────
  # Always runs after the main test job (on every push and PR).
  #
  # Normal mode (default): runs in compare-only mode. autoSaveBaseline:true in
  # wdio.screenshots.conf.ts handles first-run cases (auto-creates missing baselines).
  # Tests fail if mismatch > 2% threshold. Only newly auto-saved baselines are
  # committed back (changed files won't show a diff if comparison passed).
  #
  # Update mode: trigger via workflow_dispatch with update_baselines=true to
  # force-overwrite all baselines after an intentional UI change.
  #
  # Requires the repo to allow Actions to create commits:
  #   Settings → Actions → Workflow permissions → "Read and write permissions"
  screenshot-regression:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated baseline PNGs back via LFS

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # pull baseline PNG files from LFS storage
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out as a real local branch (not detached HEAD) so git push works.
          # github.head_ref is the PR source branch; github.ref_name is the push branch.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install system dependencies (Xvfb for headless Electron)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run visual regression tests
        run: |
          if [ "${{ github.event.inputs.update_baselines }}" = "true" ]; then
            echo "Running in update-baseline mode (workflow_dispatch requested)"
            npx wdio run wdio.screenshots.conf.ts --update-visual-baseline
          else
            echo "Running in compare mode (baselines must match within threshold)"
            npx wdio run wdio.screenshots.conf.ts
          fi
        env:
          DISPLAY: ':99'

      - name: Commit new baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/baseline/
          # Only commit when there are changes (new auto-saved baselines or explicit update).
          # In compare mode only newly auto-saved baselines (untracked → added) will appear
          # here; existing baselines that passed comparison won't show a diff.
          git diff --staged --quiet || git commit -m "Auto-update screenshot baselines [skip ci]"
          # --force-with-lease is safer than --force — it only overwrites if the
          # remote ref matches what we fetched at checkout, protecting against
          # unrelated pushes while still handling a prior CI baseline commit.
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: |
            .tmp/visual/actual/
            .tmp/visual/diff/
            e2e/screenshots/baseline/
          if-no-files-found: warn
          retention-days: 30
