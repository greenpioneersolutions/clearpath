name: CI — Tests

on:
  push:
    branches:
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Verify Git LFS
        run: git lfs ls-files

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

  # ── Screenshot regression tests ──────────────────────────────────────────────
  # Always runs after the main test job (on every push and PR).
  # Captures rendered UI screenshots, compares them against the baselines in
  # e2e/screenshots/baseline/ (tracked via Git LFS), and — if any differ —
  # automatically commits the updated baselines back to the branch.
  #
  # Requires the repo to allow Actions to create commits:
  #   Settings → Actions → Workflow permissions → "Read and write permissions"
  screenshot-regression:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated baseline PNGs back via LFS

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # pull baseline PNG files from LFS storage
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install system dependencies (Xvfb for headless Electron)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Capture screenshots (actual)
        run: SCREENSHOT_DIR=e2e/screenshots/actual npx wdio run wdio.screenshots.conf.ts
        env:
          DISPLAY: ':99'
          SCREENSHOT_DIR: e2e/screenshots/actual

      - name: Compare actual screenshots against baselines
        id: compare
        run: |
          changed=false
          shopt -s nullglob
          mkdir -p e2e/screenshots/baseline
          for actual in e2e/screenshots/actual/*.png; do
            name=$(basename "$actual")
            baseline="e2e/screenshots/baseline/$name"
            if [ ! -f "$baseline" ] || ! cmp -s "$actual" "$baseline"; then
              echo "Changed: $name"
              changed=true
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Update baselines with new screenshots
        if: steps.compare.outputs.changed == 'true'
        run: |
          cp e2e/screenshots/actual/*.png e2e/screenshots/baseline/
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install --local
          git add e2e/screenshots/baseline/
          git diff --cached --quiet || git commit -m "chore: update screenshot baselines [skip ci]"
          git lfs push origin HEAD
          git push

      - name: Upload actual screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-actual
          path: e2e/screenshots/actual/
          if-no-files-found: warn
          retention-days: 30
