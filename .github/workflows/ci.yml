name: CI — Tests

on:
  push:
    branches:
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Verify Git LFS
        run: git lfs ls-files

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

  # ── Screenshot regression tests ──────────────────────────────────────────────
  # Always runs after the main test job (on every push and PR).
  # Captures rendered UI screenshots, compares them against the baselines in
  # e2e/screenshots/baseline/ (tracked via Git LFS), and — if any differ —
  # automatically commits the updated baselines back to the branch.
  #
  # Requires the repo to allow Actions to create commits:
  #   Settings → Actions → Workflow permissions → "Read and write permissions"
  screenshot-regression:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated baseline PNGs back via LFS

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # pull baseline PNG files from LFS storage
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install system dependencies (Xvfb for headless Electron)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run visual regression tests (update baselines)
        run: npx wdio run wdio.screenshots.conf.ts --update-visual-baseline
        env:
          DISPLAY: ':99'

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/baseline/
          git diff --staged --quiet || git commit -m "Auto-update screenshot baselines [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: |
            .tmp/visual/actual/
            .tmp/visual/diff/
            e2e/screenshots/baseline/
          if-no-files-found: warn
          retention-days: 30
