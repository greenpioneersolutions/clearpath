name: CI — Tests

on:
  push:
    branches:
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Verify Git LFS
        run: git lfs ls-files

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

  # ── Screenshot capture ───────────────────────────────────────────────────────
  # Always runs after the main test job (on every push and PR).
  #
  # Policy: this job *captures* visual changes; it does NOT gate the CI on
  # pixel mismatches. wdio is invoked with --update-visual-baseline so every
  # baseline is overwritten with the current actual screenshot, and the
  # downstream commit step pushes those updates back as a separate
  # "Auto-update screenshot baselines" commit. Reviewers see the visual
  # changes as PR diffs (LFS pointer hash changes) without the test failing.
  #
  # Real failures still bubble up: navigation timeouts, missing elements,
  # JS errors during the crawl, and app-load failures all surface as job
  # errors here. Only the pixel-mismatch comparison was removed.
  #
  # Requires the repo to allow Actions to create commits:
  #   Settings → Actions → Workflow permissions → "Read and write permissions"
  screenshot-regression:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated baseline PNGs back via LFS

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # pull baseline PNG files from LFS storage
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out as a real local branch (not detached HEAD) so git push works.
          # github.head_ref is the PR source branch; github.ref_name is the push branch.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install system dependencies (Xvfb for headless Electron)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run screenshot crawl
        # Always run with --update-visual-baseline. This captures the current
        # state of every page/tab as the new baseline; the next "Commit new
        # baselines" step pushes those updates back so reviewers see what
        # changed in the PR diff. Real test failures (navigation timeouts,
        # missing elements, app crashes) still fail this step and stop CI.
        run: npx wdio run wdio.screenshots.conf.ts --update-visual-baseline
        env:
          DISPLAY: ':99'

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/baseline/
          # Commit only when something actually changed. With --update-visual-baseline
          # a baseline only diffs if the captured pixels differ from the previous
          # baseline, so this commit is skipped when nothing visual changed.
          git diff --staged --quiet || git commit -m "Auto-update screenshot baselines [skip ci]"
          # --force-with-lease is safer than --force — it only overwrites if the
          # remote ref matches what we fetched at checkout, protecting against
          # unrelated pushes while still handling a prior CI baseline commit.
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: |
            .tmp/visual/actual/
            .tmp/visual/diff/
            e2e/screenshots/baseline/
          if-no-files-found: warn
          retention-days: 30
