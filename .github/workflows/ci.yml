name: CI — Tests

on:
  push:
    branches:
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Unit tests + build ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Verify Git LFS
        run: git lfs ls-files

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

  # ── Playwright functional e2e ───────────────────────────────────────────────
  # Replaces the WDIO functional run. Covers every spec in
  # `e2e/*.pw.spec.ts` except the visual crawls and extensions-integration
  # (which have dedicated jobs).
  #
  # Trace + html report + per-test screenshots are uploaded as a
  # `playwright-report` artifact for failure post-mortem.
  playwright-functional:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Linux deps for Electron headless
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run Playwright functional tests
        run: npx playwright test
        env:
          DISPLAY: ':99'
          # Skip the renderer fonts.ready wait — some Electron pages keep that
          # promise pending forever and hang page.screenshot. Captures still
          # land via the helper's short-timeout fallback.
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  # ── Playwright extensions integration ───────────────────────────────────────
  # Requires the bundled SDK example .clear.ext + an experimental build (the
  # Extensions tab is gated behind an experimental flag).
  playwright-extensions:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension SDK example
        run: npm run pretest:e2e:extensions

      - name: Build app with experimental flag
        run: npm run build
        env:
          CLEARPATH_E2E_EXPERIMENTAL: '1'

      - name: Install Linux deps for Electron headless
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run extensions integration tests
        run: npx playwright test -c playwright.extensions.config.ts
        env:
          DISPLAY: ':99'
          CLEARPATH_E2E_EXPERIMENTAL: '1'
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'

      - name: Upload extensions report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-extensions-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  # ── Screenshot capture ──────────────────────────────────────────────────────
  # Runs after the functional job succeeds. Policy mirrors the previous WDIO
  # workflow: invoke with -u (the spec's update path uses Electron's
  # `BrowserWindow.capturePage()` directly, bypassing Playwright's flaky
  # font/animation waits). Any baseline whose pixels actually changed gets
  # committed back; identical-pixel re-encodes don't churn the LFS file
  # because the spec writes byte-for-byte the same PNG when the source
  # frame is unchanged.
  #
  # Real failures still bubble: navigation timeouts, missing elements, JS
  # errors during the crawl, and app-load failures all surface here.
  #
  # Requires the repo to allow Actions to create commits:
  #   Settings → Actions → Workflow permissions → "Read and write permissions"
  screenshot-regression:
    needs: playwright-functional
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated baseline PNGs back via LFS

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out as a real local branch (not detached HEAD) so git push works.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Linux deps for Electron headless
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run screenshot crawl with baseline regeneration
        # -u writes baselines via Electron's BrowserWindow.capturePage(),
        # bypassing every implicit wait inside page.screenshot. The spec
        # writes byte-identical PNGs for unchanged frames so unrelated
        # commits don't churn LFS files.
        run: npx playwright test -c playwright.screenshots.config.ts -u
        env:
          DISPLAY: ':99'
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/baseline/
          # Commit only when a baseline actually changed. Tags whose pixels
          # were unchanged produce identical PNGs (the spec uses Electron's
          # native PNG encoder deterministically).
          git diff --staged --quiet || git commit -m "Auto-update screenshot baselines [skip ci]"
          # --force-with-lease protects against unrelated pushes while still
          # handling a prior CI baseline commit.
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: |
            test-results-visual/
            e2e/screenshots/baseline/
          if-no-files-found: warn
          retention-days: 30

  # ── Experimental-feature screenshot capture ─────────────────────────────────
  # Captures pages that are tree-shaken out of the default build. The build
  # step sets CLEARPATH_E2E_EXPERIMENTAL=1 so every experimental flag is
  # forced ON, restoring the gated page chunks to the bundle for visual
  # coverage.
  #
  # Baselines for these screenshots live under
  #   e2e/screenshots/baseline/experimental-features/
  # so they don't pollute the normal baseline directory.
  screenshot-regression-experimental:
    # Run after the default screenshot job so any auto-baseline commit it
    # produced is already on the branch — avoids a force-push race.
    needs: screenshot-regression
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app with experimental flags forced on
        run: npm run build
        env:
          CLEARPATH_E2E_EXPERIMENTAL: '1'

      - name: Install Linux deps for Electron headless
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libasound2-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1440x900x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Run experimental screenshot crawl
        run: npx playwright test -c playwright.screenshots.experimental.config.ts -u
        env:
          DISPLAY: ':99'
          CLEARPATH_E2E_EXPERIMENTAL: '1'
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'

      - name: Commit updated experimental baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/baseline/experimental-features/ || true
          git diff --staged --quiet || git commit -m "Auto-update experimental screenshot baselines [skip ci]"
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload experimental screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-experimental
          path: |
            test-results-visual-experimental/
            e2e/screenshots/baseline/experimental-features/
          if-no-files-found: warn
          retention-days: 30
